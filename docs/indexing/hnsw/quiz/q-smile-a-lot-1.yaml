author: smile-a-lot
date: 2026-05-29
question: |
  某一個工程師決定將 HNSW 的 layer0 和其他 layer 分開存在兩顆 SSD 上：
  - SSD A（存放 layer0）：全新的 SLC SSD，確保資料不會出現 error。
  - SSD B（存放其他 layer）：快被寫穿的 QLC SSD，可能會有較高的 error rate。
  - `efsearch = 200`
  - 回傳 top 10 的結果
  假設系統可以檢測出某個 node 是否有 error，但無法修復，且在搜尋過程中會跳過有 error 的 node。且若該層所有 candidate nodes 都有 error，或導航中斷，則直接從目前的 node 降到下一層繼續搜尋。
  如果 layer0 是一個 connected graph（任兩個 node u, v，存在一個 path(u, v)），只對這些資料做 search，則下列關於 recall 或 latency 的敘述何者**錯誤**？

options:
  - text: "對比 error rate = 0 的 HNSW，recall 可能會下降。"
    explanation: |
      最終仍然在 layer0 做 beam search，上層導航失敗可能使搜尋卡在 layer0 的局部極值，recall 因此降低。

  - text: "對比 error rate = 0 的 HNSW，recall 跟 latency 都維持不變。"
    correct: true
    explanation: |
      最終仍然在 layer0 做 beam search，上層導航失敗可能使搜尋卡在 layer0 的區間極值，recall 因此降低。
      上層的 error 會導致搜尋過程中頻繁地降層，無法發揮 HNSW 的層級導航優勢，在 layer0 做了太多次 search，導致 latency 大幅增加。
      
  - text: "latency 會大幅增加，甚至可能無法在合理時間內完成搜尋。"
    explanation: |
      上層的 error 會導致搜尋過程中頻繁地降層，無法發揮 HNSW 的層級導航優勢，在 layer0 做了太多次 search，導致 latency 大幅增加。

  - text: "如果 error rate 夠小，latency 仍然可以維持在合理範圍內。"
    explanation: |
      如果 error rate 夠小，搜尋過程中大多數的 node 都是可用的，仍然可以有效利用 HNSW 的層級導航優勢，保持 latency 在合理範圍內。