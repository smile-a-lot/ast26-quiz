author: SJieNg123
date: 2026-05-27
question: |
  某新創公司的 RAG 系統初期只有 1 萬筆內部文件 chunks，採用精確比對。隨著業務擴張文件量暴增至 5000 萬筆，精確搜尋導致每次檢索需耗時數秒，嚴重拖慢 LLM 生成速度。
  工程師決定將檢索底層替換為 ANN。上線後檢索延遲成功降至毫秒級，但測試人員回報：對於相同的提問，系統現在偶爾會漏掉原本在舊系統中能精準抓到的最佳參考文件，導致 LLM 回答品質下降。
  下列關於此現象的解釋與評估方式，何者最為正確？
options:
  - text: "這是因為 ANN 返回的距離分數都是近似值，LLM 在接收到帶有誤差的分數後產生了 hallucination，進而忽略了正確的文件。工程團隊應使用 ROUGE Score 來監控此現象。"
    correct: false
    explanation: |
      在 RAG 中傳遞給 LLM 的是檢索出來的純文字內容，而非向量距離分數。LLM 回答品質下降是因為底層沒有把正確文字 chunk 撈出來餵給它，這與 LLM 本身的幻覺機制無關。
  - text: "這是由於 Embedding 模型在大規模資料下的語意擁擠所致，與搜尋演算法無關。即使維持精確搜尋，只要資料量大同樣會漏掉文件。唯一的解法是重新微調 Embedding 模型。"
    correct: false
    explanation: |
      精確搜尋的定義就是保證找出數學距離上絕對最接近的 Top-K 向量，無論資料量多大都不會漏掉。會漏掉文件的根本原因是換了搜尋演算法，而非模型語意問題。
  - text: "這是因為 ANN 為了加速透過分群或圖論策略大幅限縮了比對範圍，放棄了窮舉掃描，因此有一定機率錯過真正的最相似向量。工程團隊應使用 Recall@K 指標來量化這種近似帶來的品質損失。"
    correct: true
    explanation: |
      這精確描述了 ANN 的核心：以犧牲部分 Accuracy/Recall 來換取極大的速度與延遲優勢。Recall 就是用來衡量 ANN 找到的 Top-K 結果中，有多少比例是真正 Exact Search 的 Top-K 的標準指標。
  - text: "這是因為導入 ANN 會自動觸發 PQ，強制將高維度浮點數壓縮為整數，導致向量語意遭到不可逆的破壞。只要關閉 PQ 即可在維持毫秒級速度的同時，恢復 100% 的檢索精確度。"
    correct: false
    explanation: |
      ANN 不一定等於 PQ，兩者是獨立的技術 (PQ 是壓縮技術，HNSW 是搜尋結構)。此外，即使不使用 PQ，任何 ANN 本身就存在漏抓的機率，無法保證 100% 精確度。
