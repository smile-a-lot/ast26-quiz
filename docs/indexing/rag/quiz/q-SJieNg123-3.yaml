author: SJieNg123
date: 2026-05-27
question: |
  某資料團隊在處理百億等級的短文字向量檢索時面臨記憶體枯竭。工程師研究 LEANN 論文後，決定導入 動態計算 Embedding 機制。
  團隊內部對於這個機制的運作原理與適用場景產生了爭論。下列哪一位工程師的觀點最準確地描述了 LEANN 中動態算 Embedding 的底層邏輯與優勢？
options:
  - text: "工程師 A：這個機制的本質是以算力換取記憶體。因為短文字的原始資料大小通常遠小於 float32 的高維度向量，系統可以丟棄精確向量，只保留壓縮索引與短文字。在搜尋第二階段，才針對少數候選節點即時重算精確向量，藉此在極低記憶體佔用下修復 Recall"
    correct: true
    explanation: |
      正確。對於短文字而言，Embedding 會帶來 Space Amplification（例如幾十 byte 的字串變成 3KB 的向量）。捨棄龐大的靜態向量，改在 Reranking 階段動態重算少數候選者的向量，能將記憶體用量壓到極致，
      同時利用精確距離校正 PQ 與 Graph Pruning 帶來的誤差。
  - text: "工程師 B：動態計算是為了在第一階段的 Graph Routing 中擺脫對 PQ 的依賴。系統在遍歷圖的過程中，針對路徑上遇到的每一個節點，即時載入硬碟資料並算出精確 Embedding，消除走錯路徑的機率。"
    explanation: |
      如果在圖論導航的第一階段就針對每個路過節點動態重算，會引發極大的延遲與 I/O 瓶頸。LEANN 第一階段仍然高度依賴高度壓縮（如 PQ）的近似距離來做低成本導航，只在最後選出 Top-K 候選者時才進行動態重算。
  - text: "工程師 C：這個設計最適合用在以圖搜圖或影音檢索。因為圖片或影片檔案極大，我們無法將其對應的 Embedding 全部放進記憶體，所以透過即時呼叫 Vision Model 動態計算來節省空間。"
    explanation: |
      對於多媒體資料，原始檔案通常高達數 MB，遠大於數 KB 的 Embedding。強迫系統常駐龐大的原始檔案供動態計算，會大幅增加記憶體或 I/O 的 loading。動態重算的先決條件是原始檔案體積必須小於向量體積。
  - text: "工程師 D：導入動態計算是為了解決 LLM 的幻覺問題。當 LLM 在生成每個 token 時，系統會動態算出該 token 的 Embedding 並與資料庫比對，即時修正 LLM 接下來的輸出機率分佈。"
    explanation: |
      LEANN 與 LLM Decode 的過程是兩個完全獨立的系統。動態計算 Embedding 是為了降低檢索系統自身的記憶體成本與維持檢索 Recall，並不會介入或改變 LLM 生成 token 的運作機制。
