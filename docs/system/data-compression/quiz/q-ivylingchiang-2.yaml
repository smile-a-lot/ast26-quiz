author: "ivylingchiang"
date: "2026-05-27"

question: |
  現代儲存系統常採用 Block Compression 以支援局部資料讀取。若系統將區塊大小（Block Size）由 4 KB 調整為 128 KB，最可能對系統行為產生何種影響？

options:
  - text: "壓縮演算法可利用較大的資料上下文以提高壓縮率，但在隨機讀取少量資料時，可能產生較高的讀取放大與記憶體使用成本。"
    correct: true
    explanation: |
      正確。較大的區塊可增加演算法偵測重複資料的機會，因此通常有助於提高壓縮率。然而，即使僅需存取少量資料，系統仍需載入並解壓縮整個區塊，進而增加讀取放大與記憶體使用量。

  - text: "由於每次讀取的資料單位增加，系統在小型隨機存取工作負載下的讀取放大現象通常會降低。"
    explanation: |
      區塊變大通常會使隨機讀取時的讀取放大現象更加明顯，而非降低。

  - text: "區塊範圍增加會降低資料重複模式的可見性，因此壓縮率通常會下降。"
    explanation: |
      較大的區塊通常能提供更多資料上下文，使演算法更容易發現重複模式，因此壓縮率往往會提高。

  - text: "當區塊大小增加時，系統需要維護更多位移索引（Offset Index），因此索引記憶體成本通常會提高。"
    explanation: |
      區塊變大後，相同資料量所需的區塊數量通常會減少，因此索引數量通常也會降低。
