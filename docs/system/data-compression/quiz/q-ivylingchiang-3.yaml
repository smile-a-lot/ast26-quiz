author: "ivylingchiang"
date: "2026-05-27"

question: |
  當儲存系統處理 JPEG 圖片、視訊檔案以及經 TLS 加密的封包記錄時，下列何種壓縮策略較符合系統資源管理原則？

options:
  - text: "由於這類資料通常已經過壓縮或具備較高熵值，再次套用通用壓縮演算法通常難以取得明顯的空間節省，因此系統可選擇直接儲存以降低額外 CPU 開銷。"
    correct: true
    explanation: |
      正確。JPEG、視訊資料與加密資料通常已具備較高的資料熵，常規壓縮演算法通常難以進一步降低資料大小。此時再次壓縮可能增加額外 CPU 成本，而無法取得對應的空間收益。

  - text: "應使用 xz 或 zstd 的高壓縮等級，以提高儲存空間利用率。"
    explanation: |
      對高熵資料而言，即使使用較高壓縮等級，通常仍難以取得明顯壓縮效果，但會增加額外的 CPU 計算成本。

  - text: "應優先使用 Fixed-input 的 Block Compression，以確保壓縮資料能對齊作業系統的實體分頁邊界。"
    explanation: |
      Fixed-input 設計並不保證輸出大小固定，因此無法確保資料對齊固定的實體分頁邊界。

  - text: "應使用 LZ4 進行即時壓縮，以降低高熵資料在解壓縮階段的延遲。"
    explanation: |
      雖然 LZ4 具有較高吞吐量，但對難以壓縮的資料而言，系統仍可能承擔額外的 I/O 攔截與 CPU 運算成本，而無法取得明顯壓縮收益。
